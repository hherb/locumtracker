<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2E7D32;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1B5E20;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="crossGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8F5E9;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bgGradient)"/>

  <!-- Subtle grid pattern for "tracking" feel -->
  <g opacity="0.08">
    <line x1="256" y1="0" x2="256" y2="1024" stroke="white" stroke-width="2"/>
    <line x1="512" y1="0" x2="512" y2="1024" stroke="white" stroke-width="2"/>
    <line x1="768" y1="0" x2="768" y2="1024" stroke="white" stroke-width="2"/>
    <line x1="0" y1="256" x2="1024" y2="256" stroke="white" stroke-width="2"/>
    <line x1="0" y1="512" x2="1024" y2="512" stroke="white" stroke-width="2"/>
    <line x1="0" y1="768" x2="1024" y2="768" stroke="white" stroke-width="2"/>
  </g>

  <!-- Location pin shape (outer) -->
  <path d="M512 140
           C340 140 200 280 200 440
           C200 620 512 884 512 884
           C512 884 824 620 824 440
           C824 280 684 140 512 140 Z"
        fill="white"
        filter="url(#shadow)"
        opacity="0.95"/>

  <!-- Inner circle of pin -->
  <circle cx="512" cy="420" r="180" fill="url(#bgGradient)"/>

  <!-- Medical cross -->
  <g fill="white">
    <!-- Vertical bar -->
    <rect x="472" y="300" width="80" height="240" rx="12"/>
    <!-- Horizontal bar -->
    <rect x="392" y="380" width="240" height="80" rx="12"/>
  </g>

  <!-- Small clock/time indicator (bottom right of pin) -->
  <circle cx="680" cy="680" r="80" fill="#FFC107" stroke="white" stroke-width="8" filter="url(#shadow)"/>
  <circle cx="680" cy="680" r="60" fill="white"/>
  <!-- Clock hands -->
  <line x1="680" y1="680" x2="680" y2="640" stroke="#1B5E20" stroke-width="8" stroke-linecap="round"/>
  <line x1="680" y1="680" x2="710" y2="690" stroke="#1B5E20" stroke-width="6" stroke-linecap="round"/>
  <circle cx="680" cy="680" r="8" fill="#1B5E20"/>
</svg>
